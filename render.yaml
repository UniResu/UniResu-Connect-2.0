# render.yaml — Infrastructure as Code (Blueprint) para o Render
# Docs: https://render.com/docs/blueprint-spec
#
# Monorepo:
#   - backend/  → FastAPI (Python) servido por Uvicorn
#   - frontend/ → Next.js (Node) servido pelo `next start`
#
# Deploy:
#   1. Conectar o repo no Render como "Blueprint".
#   2. O Render lê este arquivo e provisiona os dois Web Services.
#   3. Definir segredos (MONGO_URI, ORCID_*, etc.) no dashboard.

services:
  # ────────────────────────────────────────────────────────────
  # Backend — FastAPI / Uvicorn
  # ────────────────────────────────────────────────────────────
  - type: web
    name: uniresu-api
    env: python
    region: ohio
    plan: free
    rootDir: backend
    healthCheckPath: /health
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: MONGO_URI
        sync: false  # Definir manualmente no dashboard (segredo)
      - key: MONGO_DB_NAME
        value: UniResuDB
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ORCID_CLIENT_ID
        sync: false
      - key: ORCID_CLIENT_SECRET
        sync: false
      - key: ORCID_REDIRECT_URI
        sync: false
      - key: ORCID_BASE_URL
        value: https://orcid.org
      - key: ORCID_API_URL
        value: https://pub.orcid.org/v3.0
      # CORS — URL pública do front-end é injetada dinamicamente pelo Render
      - key: FRONTEND_URL
        fromService:
          name: uniresu-frontend
          type: web
          property: url

  # ────────────────────────────────────────────────────────────
  # Frontend — Next.js
  # ────────────────────────────────────────────────────────────
  - type: web
    name: uniresu-frontend
    env: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      # URL da API injetada a partir do serviço backend
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: uniresu-api
          type: web
          property: url
      - key: NEXT_PUBLIC_ORCID_CLIENT_ID
        sync: false
