# render.yaml — Infrastructure as Code (Blueprint) para o Render
# Docs: https://render.com/docs/blueprint-spec
#
# Monorepo:
#   - backend/  → FastAPI (Python) servido por Uvicorn
#   - frontend/ → Next.js (Node) servido pelo `next start`
#
# Nota sobre service linking:
#   O Render Blueprint não aceita `property: url` em serviços web — apenas
#   `property: host`, que retorna o hostname puro (ex.: uniresu-api.onrender.com).
#   A URL completa "https://<host>" é montada via shell no buildCommand do
#   front-end (onde Next.js congela o NEXT_PUBLIC_API_URL no bundle) e via
#   código no back-end (main.py prefixa https:// automaticamente se faltar).

services:
  # ────────────────────────────────────────────────────────────
  # Backend — FastAPI / Uvicorn
  # ────────────────────────────────────────────────────────────
  - type: web
    name: uniresu-api
    env: python
    region: ohio
    plan: free
    rootDir: backend
    healthCheckPath: /health
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: MONGO_URI
        sync: false  # Definir manualmente no dashboard (segredo)
      - key: MONGO_DB_NAME
        value: UniResuDB
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ORCID_CLIENT_ID
        sync: false
      - key: ORCID_CLIENT_SECRET
        sync: false
      - key: ORCID_REDIRECT_URI
        sync: false
      - key: ORCID_BASE_URL
        value: https://orcid.org
      - key: ORCID_API_URL
        value: https://pub.orcid.org/v3.0
      - key: NEXT_PUBLIC_SITE_URL
        value: https://uniresu.org
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_REMETENTE
        value: "UniResu <contato@uniresu.org>"
      - key: EMAIL_SUPORTE
        value: uniresuconnect@gmail.com
      # CORS — host público do front-end injetado dinamicamente pelo Render.
      # main.py normaliza o valor para https://<host> antes de aplicar no CORS.
      - key: FRONTEND_URL
        fromService:
          name: uniresu-frontend
          type: web
          property: host

  # ────────────────────────────────────────────────────────────
  # Frontend — Next.js
  # ────────────────────────────────────────────────────────────
  - type: web
    name: uniresu-frontend
    env: node
    region: ohio
    plan: free
    rootDir: frontend
    # NEXT_PUBLIC_API_URL precisa existir em tempo de build: o Next.js
    # congela variaveis NEXT_PUBLIC_* no bundle. Usamos a URL estatica do
    # servico de API no Render para garantir que o valor certo seja injetado.
    buildCommand: npm install && NEXT_PUBLIC_API_URL=https://uniresu-api.onrender.com npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_ORCID_CLIENT_ID
        sync: false
